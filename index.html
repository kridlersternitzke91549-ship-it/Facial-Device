<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精準保養升級 | 20日煥膚計畫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --apple-bg: #000000; --apple-card: #1c1c1e; --apple-blue: #007AFF; --apple-text: #ffffff; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--apple-bg); color: var(--apple-text); overflow-x: hidden; scroll-behavior: smooth; }
        .glass { background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-gradient { background: radial-gradient(circle at center, #1c1c1e 0%, #000000 100%); }
        .cta-button { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .cta-button:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 122, 255, 0.4); }
    </style>
</head>
<body class="antialiased">
    <!-- Hero Section -->
    <section class="relative min-h-screen flex items-center justify-center pt-20 pb-12 hero-gradient overflow-hidden">
        <div class="container mx-auto px-6 relative z-10 text-center">
            <h1 class="text-4xl md:text-6xl font-bold mb-6 tracking-tight">不是用更多，<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400">而是讓使用的真正進去</span></h1>
            <p class="text-lg md:text-xl text-gray-400 mb-12 max-w-2xl mx-auto leading-relaxed">這是一個教你「少走冤枉路」，用對方法變美的居家科技保養品牌。</p>
            <div class="relative max-w-4xl mx-auto mb-16">
                <img src="https://api.kuse.ai/api/folder/v1/file/00e0195e4e168e5c0fe144264d88ea8c6d6ddb0a85de5a39169ef41965b57fdd_4494827.jpeg" alt="精準保養導入儀" class="rounded-3xl shadow-2xl mx-auto border border-white/10">
            </div>
            <div class="flex flex-col md:flex-row gap-4 justify-center items-center">
                <a href="#plan" class="cta-button w-full md:w-auto px-8 py-4 bg-white text-black font-bold rounded-full text-lg">立即申請：20日煥膚實測組</a>
                <a href="#analysis" class="cta-button w-full md:w-auto px-8 py-4 glass text-white font-medium rounded-full text-lg border border-white/20">預約線上 1:1 肌膚分析</a>
            </div>
        </div>
    </section>

    <!-- Content Section -->
    <section class="py-24 bg-black">
        <div class="container mx-auto px-6 text-center max-w-4xl">
            <h2 class="text-3xl font-bold mb-8 italic text-blue-400">精準保養升級</h2>
            <p class="text-gray-400 leading-relaxed mb-6 text-lg">擺脫保養品只停留在表層的無感困境，加入這場 20 天的居家煥膚計畫！讓每一滴精華都能精準滲透🫶🏼</p>
        </div>
    </section>

    <!-- Testimonials -->
    <section class="py-24 bg-[#0a0a0a]">
        <div class="container mx-auto px-6">
            <div class="grid md:grid-cols-2 gap-8 max-w-5xl mx-auto">
                <div class="glass p-8 rounded-3xl">
                    <p class="text-yellow-400 mb-4">★★★★★</p>
                    <p class="text-gray-300"><strong>黃*馨：</strong> 收到導入儀真的有驚艷到！搭配保濕精華，隔天早上臉還是潤的（QQ滑滑的！）。質感 OK，整體還是很推！✨💖🥰</p>
                </div>
                <div class="glass p-8 rounded-3xl">
                    <p class="text-yellow-400 mb-4">★★★★★</p>
                    <p class="text-gray-300"><strong>古*婷：</strong> 溫熱感設計非常舒服，對於提升吸收度確實有感，針對鼻翼兩側的細緻度有所改善。熟悉模式後非常好用！✨</p>
                </div>
            </div>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof lucide !== 'undefined') lucide.createIcons();
        });
    </script>
</body>
</html>
